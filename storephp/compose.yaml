
services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: storephp-php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: dev
      # Container-to-container connection
      DATABASE_URL: mysql://storephp:storephp@database:3306/storephp?serverVersion=8.0.36&charset=utf8mb4
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: storephp-nginx
    depends_on:
      - php
    ports:
      - "8085:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    image: mysql:8.0
    container_name: storephp-mysql
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: storephp
      MYSQL_USER: storephp
      MYSQL_PASSWORD: storephp
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    container_name: storephp-phpmyadmin
    depends_on:
      - database
    environment:
      PMA_HOST: database
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8086:80"

volumes:
  database_data:
