vich_uploader:
  db_driver: orm
  metadata:
    type: attribute
  mappings:
    product_media_image:
      uri_prefix: /uploads/products
      upload_destination: '%kernel.project_dir%/public/uploads/products'
      namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
      delete_on_update: true
      delete_on_remove: true
    product_media_video:
      uri_prefix: /uploads/products/videos
      upload_destination: '%kernel.project_dir%/public/uploads/products/videos'
      namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
      delete_on_update: true
      delete_on_remove: true
